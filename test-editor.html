<!DOCTYPE html>
<html>
<head>
  <title>Mock Claude.ai Editor</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 40px auto; padding: 20px; }
    .editor-container { border: 1px solid #ddd; border-radius: 12px; padding: 16px; min-height: 200px; }
    .ProseMirror { outline: none; min-height: 150px; font-size: 15px; line-height: 1.6; }
    .ProseMirror:empty::before { content: attr(data-placeholder); color: #999; }
    .images { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .images img { max-width: 200px; max-height: 150px; border-radius: 8px; }
    h1 { font-size: 1.3em; }
    #status { margin-top: 20px; padding: 12px; background: #f5f5f5; border-radius: 8px; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Mock Editor (simulating Claude.ai)</h1>
  <div class="editor-container">
    <div class="ProseMirror" contenteditable="true" data-placeholder="How can I help you today?"></div>
  </div>
  <div class="images" id="image-container"></div>
  <div id="status">Waiting for paste...</div>

  <script>
    const editor = document.querySelector('.ProseMirror');
    const imageContainer = document.getElementById('image-container');
    const status = document.getElementById('status');

    // Listen for paste events (images)
    editor.addEventListener('paste', (e) => {
      const files = e.clipboardData?.files;
      if (files && files.length > 0) {
        e.preventDefault();
        let count = 0;
        for (const file of files) {
          if (file.type.startsWith('image/')) {
            count++;
            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            imageContainer.appendChild(img);
          }
        }
        status.textContent = `Received ${count} image(s) via paste`;
        // Store count for test verification
        window._pastedImageCount = (window._pastedImageCount || 0) + count;
      }
    });

    // Track text changes
    const observer = new MutationObserver(() => {
      const text = editor.textContent;
      if (text.length > 0) {
        window._editorTextLength = text.length;
        status.textContent = `Editor has ${text.length} characters of text`;
      }
    });
    observer.observe(editor, { childList: true, subtree: true, characterData: true });
  </script>
</body>
</html>
