<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 320px;
  background: #1a1a2e;
  color: #fff;
  font: 13px/1.4 system-ui, sans-serif;
  padding: 14px;
}
button {
  cursor: pointer;
  border: none;
  border-radius: 6px;
  font: inherit;
  transition: opacity 0.15s;
}
button:hover { opacity: 0.85; }
button:active { opacity: 0.7; }

#btn-summarize {
  width: 100%;
  padding: 10px;
  background: #6c7cff;
  color: #fff;
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 10px;
}

.question-row {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
#input-question {
  flex: 1;
  padding: 8px 10px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: #fff;
  font: inherit;
  outline: none;
}
#input-question::placeholder { color: rgba(255,255,255,0.4); }
#input-question:focus { border-color: #6c7cff; }
#btn-send { background: #6c7cff; color: #fff; padding: 8px 12px; }
#btn-save { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); padding: 8px 10px; font-size: 15px; }

.section-label {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
#saved-prompts {
  max-height: 200px;
  overflow-y: auto;
}
.prompt-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.prompt-item:hover { background: rgba(255,255,255,0.08); }
.prompt-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: rgba(255,255,255,0.85);
}
.prompt-delete {
  background: none;
  color: rgba(255,255,255,0.3);
  padding: 2px 6px;
  font-size: 14px;
  border-radius: 4px;
}
.prompt-delete:hover { color: #ff6b6b; background: rgba(255,107,107,0.15); }
#no-prompts {
  color: rgba(255,255,255,0.25);
  font-style: italic;
  padding: 4px 8px;
}
</style>
</head>
<body>
  <button id="btn-summarize">Summarize</button>

  <div class="question-row">
    <input id="input-question" type="text" placeholder="Ask a question...">
    <button id="btn-send" title="Send question">Go</button>
    <button id="btn-save" title="Save as prompt">+</button>
  </div>

  <div id="prompts-section" style="display:none">
    <div class="section-label">Saved Prompts</div>
    <div id="saved-prompts"></div>
  </div>
  <div id="no-prompts">No saved prompts yet</div>

  <script src="popup.js"></script>
</body>
</html>
