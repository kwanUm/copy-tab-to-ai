<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 320px;
  background: #1a1a2e;
  color: #fff;
  font: 13px/1.4 system-ui, sans-serif;
  padding: 14px;
}
button {
  cursor: pointer;
  border: none;
  border-radius: 6px;
  font: inherit;
  transition: opacity 0.15s;
}
button:hover { opacity: 0.85; }
button:active { opacity: 0.7; }

.target-row {
  display: flex;
  gap: 4px;
  margin-bottom: 10px;
}
.target-btn {
  flex: 1;
  padding: 6px 8px;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  text-align: center;
}
.target-btn.active {
  background: rgba(108,124,255,0.25);
  color: #fff;
  box-shadow: inset 0 0 0 1px #6c7cff;
}
#custom-url-row {
  margin-bottom: 10px;
}
#input-custom-url {
  width: 100%;
  padding: 7px 10px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: #fff;
  font: inherit;
  font-size: 12px;
  outline: none;
}
#input-custom-url::placeholder { color: rgba(255,255,255,0.35); }
#input-custom-url:focus { border-color: #6c7cff; }

#btn-summarize {
  width: 100%;
  padding: 10px;
  background: #6c7cff;
  color: #fff;
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 10px;
}

.question-row {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
#input-question {
  flex: 1;
  padding: 8px 10px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: #fff;
  font: inherit;
  outline: none;
}
#input-question::placeholder { color: rgba(255,255,255,0.4); }
#input-question:focus { border-color: #6c7cff; }
#btn-send { background: #6c7cff; color: #fff; padding: 8px 12px; }
#btn-save { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); padding: 8px 10px; font-size: 15px; }

.section-label {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
#saved-prompts {
  max-height: 200px;
  overflow-y: auto;
}
.prompt-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.prompt-item:hover { background: rgba(255,255,255,0.08); }
.prompt-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: rgba(255,255,255,0.85);
}
.prompt-delete {
  background: none;
  color: rgba(255,255,255,0.3);
  padding: 2px 6px;
  font-size: 14px;
  border-radius: 4px;
}
.prompt-delete:hover { color: #ff6b6b; background: rgba(255,107,107,0.15); }
#no-prompts {
  color: rgba(255,255,255,0.25);
  font-style: italic;
  padding: 4px 8px;
}
</style>
</head>
<body>
  <div class="target-row">
    <button class="target-btn" data-target="claude"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px"><path d="M4.709 15.955l4.397-2.006a.253.253 0 0 1 .338.119l1.245 2.568a.253.253 0 0 1-.107.33l-4.437 2.429a.253.253 0 0 1-.362-.144l-1.205-2.99a.253.253 0 0 1 .131-.306zm8.042-3.701L17.136 10a.253.253 0 0 1 .345.093l1.497 2.592a.253.253 0 0 1-.088.344l-4.432 2.633a.253.253 0 0 1-.354-.104l-1.45-2.97a.253.253 0 0 1 .097-.334z"/></svg> Claude</button>
    <button class="target-btn" data-target="chatgpt"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px"><path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855l-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08L8.704 5.46a.795.795 0 0 0-.393.681zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"/></svg> ChatGPT</button>
    <button class="target-btn" data-target="custom">Custom</button>
  </div>
  <div id="custom-url-row">
    <input id="input-custom-url" type="url" placeholder="https://your-ai-tool.com/new">
  </div>

  <button id="btn-summarize">Summarize</button>

  <div class="question-row">
    <input id="input-question" type="text" placeholder="Ask a question...">
    <button id="btn-send" title="Send question">Go</button>
    <button id="btn-save" title="Save as prompt">+</button>
  </div>

  <div id="prompts-section" style="display:none">
    <div class="section-label">Saved Prompts</div>
    <div id="saved-prompts"></div>
  </div>
  <div id="no-prompts">No saved prompts yet</div>

  <script src="popup.js"></script>
</body>
</html>
